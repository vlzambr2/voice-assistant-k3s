apiVersion: v1
kind: PersistentVolume
metadata: 
  name: music-assistant-pv-data
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /gen_cluster_fs/volumes/music-assistant/data
  claimRef:
    name: music-assistant-pvc-data
    namespace: music-assistant
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: music-assistant-pvc-data
  namespace: music-assistant
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: local-path